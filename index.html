<!DOCTYPE html>
<html lang="tg" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizStrat Pro | Financial Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 500: '#3b82f6', 600: '#2563eb' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; }
        .limit-bar { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .dark .glass-nav { background: rgba(8, 12, 20, 0.8); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#080c14] text-slate-900 dark:text-slate-100 min-h-screen pb-12">

    <nav class="sticky top-0 z-50 glass-nav border-b border-slate-200 dark:border-slate-800 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-brand-600 text-white p-2.5 rounded-2xl shadow-lg shadow-brand-500/30">
                    <i class="fas fa-chart-line text-xl"></i>
                </div>
                <span class="font-black text-2xl tracking-tighter uppercase">BIZ<span class="text-brand-600">STRAT</span></span>
            </div>
            
            <div class="flex items-center gap-4">
                <select id="langSelect" onchange="updateUI()" class="bg-slate-100 dark:bg-slate-800 border-none rounded-xl px-3 py-2 text-xs font-bold outline-none cursor-pointer hover:ring-2 ring-brand-500 transition-all">
                    <option value="tj">TJ - Тоҷикӣ</option>
                    <option value="ru">RU - Русский</option>
                    <option value="en">EN - English</option>
                </select>

                <button onclick="toggleTheme()" class="w-11 h-11 rounded-2xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center hover:bg-brand-100 dark:hover:bg-brand-900/30 transition-all">
                    <i id="themeIcon" class="fas fa-moon text-lg"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-8">

        <div class="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] border border-slate-100 dark:border-slate-800 shadow-xl relative overflow-hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 relative z-10">
                <div>
                    <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-2" data-tj="ЛИМИТИ ХАРОҶОТ (30%)" data-ru="ЛИМИТ РАСХОДОВ (30%)" data-en="EXPENSE LIMIT (30%)"></h3>
                    <div class="flex items-baseline gap-2">
                        <span id="limitDisplay" class="text-3xl font-black">0</span>
                        <span class="text-sm font-bold text-slate-400">TJS</span>
                    </div>
                </div>
                <div class="md:text-right">
                    <h3 class="text-[11px] font-bold text-brand-500 uppercase tracking-[0.2em] mb-2" data-tj="МАБЛАҒ БАРОИ РУШД (70%)" data-ru="НА РАЗВИТИЕ БИЗНЕСА (70%)" data-en="FOR BUSINESS GROWTH (70%)"></h3>
                    <div class="flex items-baseline md:justify-end gap-2 text-brand-600">
                        <span id="growthDisplay" class="text-3xl font-black text-brand-600">0</span>
                        <span class="text-sm font-bold text-slate-400">TJS</span>
                    </div>
                </div>
            </div>
            
            <div class="mt-8">
                <div class="w-full bg-slate-100 dark:bg-slate-800 h-5 rounded-full p-1 shadow-inner">
                    <div id="limitBar" class="limit-bar h-full rounded-full bg-brand-600 shadow-lg" style="width: 0%"></div>
                </div>
                <div class="flex justify-between mt-3 px-1">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">0%</span>
                    <span id="usagePercentText" class="text-xs font-black text-brand-600 uppercase tracking-widest">USAGE: 0%</span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">100%</span>
                </div>
            </div>
            
            <div id="warningMsg" class="mt-4 p-4 rounded-2xl bg-rose-50 dark:bg-rose-950/30 text-rose-500 text-center text-xs font-bold hidden animate-bounce"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white dark:bg-slate-900 p-7 rounded-[2.5rem] border border-slate-100 dark:border-slate-800 shadow-lg">
                    <h2 class="font-bold text-lg mb-6 flex items-center gap-3">
                        <span class="w-2 h-7 bg-emerald-500 rounded-full"></span>
                        <span data-tj="Иловаи Фурӯш" data-ru="Добавить Продажу" data-en="Add Sale"></span>
                    </h2>
                    <form id="pForm" class="space-y-4">
                        <input type="text" id="pName" placeholder="Item Name" required class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl p-4 outline-none focus:ring-2 ring-emerald-500 transition-all">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="pCost" placeholder="Cost" required class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl p-4 outline-none focus:ring-2 ring-emerald-500 transition-all">
                            <input type="number" id="pPrice" placeholder="Price" required class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl p-4 outline-none focus:ring-2 ring-emerald-500 transition-all">
                        </div>
                        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-2xl shadow-lg shadow-emerald-500/25 active:scale-95 transition-all uppercase text-xs tracking-widest">
                            <i class="fas fa-plus mr-2"></i> Add Product
                        </button>
                    </form>
                </div>

                <div class="bg-white dark:bg-slate-900 p-7 rounded-[2.5rem] border border-slate-100 dark:border-slate-800 shadow-lg">
                    <h2 class="font-bold text-lg mb-6 flex items-center gap-3 text-rose-500">
                        <span class="w-2 h-7 bg-rose-500 rounded-full"></span>
                        <span data-tj="Сабти Хароҷот" data-ru="Записать Расход" data-en="Record Expense"></span>
                    </h2>
                    <form id="eForm" class="space-y-4">
                        <input type="text" id="eName" placeholder="Expense Reason" required class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl p-4 outline-none focus:ring-2 ring-rose-500 transition-all">
                        <input type="number" id="eAmount" placeholder="Amount" required class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl p-4 outline-none focus:ring-2 ring-rose-500 transition-all">
                        <button type="submit" class="w-full bg-rose-500 hover:bg-rose-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-rose-500/25 active:scale-95 transition-all uppercase text-xs tracking-widest">
                            <i class="fas fa-minus mr-2"></i> Save Expense
                        </button>
                    </form>
                </div>

                <button onclick="resetData()" class="w-full py-4 text-[10px] font-black text-slate-400 hover:text-rose-500 transition-colors uppercase tracking-[0.3em]">
                    <i class="fas fa-sync-alt mr-2"></i> Reset Database
                </button>
            </div>

            <div class="lg:col-span-8 flex flex-col gap-8">
                <div class="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] border border-slate-100 dark:border-slate-800 shadow-xl flex-grow min-h-[400px]">
                    <h2 class="font-bold text-lg mb-8 flex justify-between items-center">
                        <span data-tj="Рушди Фоидаи Холис" data-ru="График Чистой Прибыли" data-en="Net Profit Growth"></span>
                        <span id="netProfitTotal" class="text-brand-600 font-black">0 TJS</span>
                    </h2>
                    <div class="relative h-[300px]">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] border border-slate-100 dark:border-slate-800 overflow-hidden shadow-sm">
                        <div class="p-4 bg-slate-50 dark:bg-slate-800/50 font-black text-[10px] uppercase tracking-widest border-b dark:border-slate-800" data-tj="Таърихи Фурӯш" data-ru="История Продаж" data-en="Sales History"></div>
                        <div id="pList" class="max-h-[250px] overflow-y-auto divide-y dark:divide-slate-800"></div>
                    </div>
                    <div class="bg-white dark:bg-slate-900 rounded-[2rem] border border-slate-100 dark:border-slate-800 overflow-hidden shadow-sm">
                        <div class="p-4 bg-slate-50 dark:bg-slate-800/50 font-black text-[10px] uppercase tracking-widest border-b dark:border-slate-800" data-tj="Таърихи Хароҷот" data-ru="История Расходов" data-en="Expense History"></div>
                        <div id="eList" class="max-h-[250px] overflow-y-auto divide-y dark:divide-slate-800"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('biz_strat_v2')) || { products: [], expenses: [] };
        let chart;

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun text-lg' : 'fas fa-moon text-lg';
            updateUI();
        }

        function updateUI() {
            const lang = document.getElementById('langSelect').value;
            localStorage.setItem('biz_lang', lang);

            // Translation Logic
            document.querySelectorAll('[data-' + lang + ']').forEach(el => {
                el.innerText = el.getAttribute('data-' + lang);
            });

            const placeholders = {
                tj: { pN: "Номи мол", pC: "Харид", pP: "Фурӯш", eN: "Мақсади хароҷот", eA: "Маблағ" },
                ru: { pN: "Название товара", pC: "Закупка", pP: "Продажа", eN: "Цель расхода", eA: "Сумма" },
                en: { pN: "Item Name", pC: "Cost", pP: "Price", eN: "Reason", eA: "Amount" }
            };
            document.getElementById('pName').placeholder = placeholders[lang].pN;
            document.getElementById('pCost').placeholder = placeholders[lang].pC;
            document.getElementById('pPrice').placeholder = placeholders[lang].pP;
            document.getElementById('eName').placeholder = placeholders[lang].eN;
            document.getElementById('eAmount').placeholder = placeholders[lang].eA;

            // Financial Calculations
            let grossProfit = 0;
            let totalExpenses = 0;
            const pList = document.getElementById('pList');
            const eList = document.getElementById('eList');
            pList.innerHTML = ''; eList.innerHTML = '';

            db.products.forEach((p, i) => {
                const profit = p.p - p.c;
                grossProfit += profit;
                pList.innerHTML += `
                    <div class="p-4 flex justify-between items-center hover:bg-slate-50 dark:hover:bg-slate-800/30">
                        <span class="text-xs font-bold">${p.n}</span>
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-black text-emerald-500">+${profit}</span>
                            <button onclick="del('p', ${i})" class="text-slate-300 hover:text-rose-500"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>`;
            });

            db.expenses.forEach((e, i) => {
                totalExpenses += e.a;
                eList.innerHTML += `
                    <div class="p-4 flex justify-between items-center hover:bg-slate-50 dark:hover:bg-slate-800/30">
                        <span class="text-xs font-bold text-rose-500">${e.n}</span>
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-black text-rose-500">-${e.a}</span>
                            <button onclick="del('e', ${i})" class="text-slate-300 hover:text-rose-500"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>`;
            });

            // 30/70 Strategy Logic
            const allowedLimit = grossProfit * 0.3;
            const reinvestmentBase = grossProfit * 0.7;
            const usagePercent = allowedLimit > 0 ? (totalExpenses / allowedLimit) * 100 : (totalExpenses > 0 ? 100 : 0);

            document.getElementById('limitDisplay').innerText = totalExpenses.toLocaleString();
            document.getElementById('growthDisplay').innerText = Math.max(0, Math.floor(reinvestmentBase + (allowedLimit - totalExpenses))).toLocaleString();
            document.getElementById('netProfitTotal').innerText = (grossProfit - totalExpenses).toLocaleString() + ' TJS';
            document.getElementById('usagePercentText').innerText = `USAGE: ${Math.floor(usagePercent)}%`;

            const bar = document.getElementById('limitBar');
            bar.style.width = Math.min(usagePercent, 100) + '%';
            bar.className = `limit-bar h-full rounded-full shadow-lg ${usagePercent > 100 ? 'bg-rose-500' : 'bg-brand-600'}`;

            const warn = document.getElementById('warningMsg');
            if (usagePercent > 100) {
                warn.classList.remove('hidden');
                warn.innerText = lang === 'tj' ? "ДИҚҚАТ! Шумо аз лимити 30% гузаштед. Барои рушди бизнес хароҷотро кам кунед!" : 
                                 lang === 'ru' ? "ВНИМАНИЕ! Лимит 30% превышен. Сократите расходы для роста бизнеса!" : 
                                 "WARNING! 30% Limit exceeded. Cut expenses to save growth capital!";
            } else { warn.classList.add('hidden'); }

            localStorage.setItem('biz_strat_v2', JSON.stringify(db));
            renderChart();
        }

        function renderChart() {
            const isDark = document.documentElement.classList.contains('dark');
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chart) chart.destroy();

            let balance = 0;
            const timeline = [...db.products.map(p => ({t: p.id, v: p.p - p.c})), ...db.expenses.map(e => ({t: e.id, v: -e.a}))].sort((a,b) => a.t - b.t);
            const dataPoints = timeline.map(e => { balance += e.v; return balance; });

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: timeline.map((_, i) => i + 1),
                    datasets: [{
                        data: dataPoints,
                        borderColor: '#2563eb',
                        borderWidth: 4,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: isDark ? 'rgba(37, 99, 235, 0.1)' : 'rgba(37, 99, 235, 0.05)',
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { display: false },
                        y: { grid: { color: isDark ? '#1e293b' : '#f1f5f9' }, ticks: { color: '#64748b', font: { size: 10 } } }
                    }
                }
            });
        }

        document.getElementById('pForm').onsubmit = (e) => {
            e.preventDefault();
            db.products.push({ id: Date.now(), n: pName.value, c: +pCost.value, p: +pPrice.value });
            e.target.reset(); updateUI();
        };

        document.getElementById('eForm').onsubmit = (e) => {
            e.preventDefault();
            db.expenses.push({ id: Date.now(), n: eName.value, a: +eAmount.value });
            e.target.reset(); updateUI();
        };

        window.del = (type, i) => {
            if (type === 'p') db.products.splice(i, 1);
            else db.expenses.splice(i, 1);
            updateUI();
        };

        window.resetData = () => { if(confirm('Reset all data?')) { db = {products:[], expenses:[]}; updateUI(); } };

        // Initial Theme & Lang
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('themeIcon').className = 'fas fa-sun text-lg';
        }
        document.getElementById('langSelect').value = localStorage.getItem('biz_lang') || 'tj';
        
        updateUI();
    </script>
</body>
</html>
